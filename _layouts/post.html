<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "en" }}">
  <header>
    <link rel="stylesheet" href="{{ "/css/main.css" | prepend: site.baseurl }}">
  </header>
  <body>
    <main class="page-content" aria-label="Content">
      <div class="wrapper">
	<div class="article">
	  <div class="title">
	    <h2>{{ page.title }}</h2>
	  </div>

	  <div class="content">
	    {{ page.content }}
	  </div>

	  {%- if page.author -%}
	  <div class="author">
	    - {{ page.author }}
	  </div>
	  {%- endif -%}

	  {%- if page.next -%}
	  <div class="next">
	    <a href="{{ page.next.url }}">Next: {{ page.next.title }}</a>
	  </div>
	  {%- endif -%}

	  {%- if page.previous -%}
	  <div class="prev">
	    <a href="{{ page.previous.url }}">Prev: {{ page.previous.title }}</a>
	  </div>
	  {%- endif -%}
	</div>
      </div>
    </main>
  </body>
</html>
